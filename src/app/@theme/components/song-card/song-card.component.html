<nb-card class="song-card" [class.playing]="isPlaying">
  <div class="artwork-container">
    <img [src]="song.artworkUrl100" [alt]="song.trackName" class="artwork" loading="lazy">
    <div class="overlay">
      <button nbButton status="primary" shape="round" class="play-btn" (click)="togglePlay()">
        <nb-icon [icon]="isPlaying ? 'pause-circle-outline' : 'play-circle-outline'"></nb-icon>
      </button>
    </div>
    <div class="genre-badge">{{ song.primaryGenreName }}</div>
  </div>

  <nb-card-body class="card-body">
    <p class="track-name" [title]="song.trackName">{{ song.trackName }}</p>
    <p class="artist-name">{{ song.artistName }}</p>
    <p class="album-name">{{ song.collectionName }}</p>

    <div class="card-actions">
      <span class="duration">{{ formatDuration(song.trackTimeMillis) }}</span>
      <div class="action-buttons">
        <button nbButton ghost size="small" (click)="toggleFavorite()" *ngIf="isLoggedIn"
                [status]="isFavorite ? 'danger' : 'basic'"
                [title]="isFavorite ? 'Quitar de favoritos' : 'Agregar a favoritos'">
          <nb-icon [icon]="isFavorite ? 'heart' : 'heart-outline'"></nb-icon>
        </button>
        <button nbButton ghost size="small" status="basic" (click)="addToPlaylist.emit(song)"
                *ngIf="isLoggedIn" title="Agregar a playlist">
          <nb-icon icon="plus-circle-outline"></nb-icon>
        </button>
      </div>
    </div>
  </nb-card-body>
</nb-card>
