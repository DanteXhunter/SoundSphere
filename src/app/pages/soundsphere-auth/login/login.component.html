<div class="auth-page">
  <nb-card class="auth-card">
    <nb-card-header>
      <h2 class="title">SoundSphere</h2>
      <p class="subtitle">Inicia sesión en tu cuenta</p>
    </nb-card-header>

    <nb-card-body>
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label class="label">Correo electrónico</label>
          <input nbInput
                 fullWidth
                 [(ngModel)]="email"
                 name="email"
                 type="email"
                 placeholder="correo@ejemplo.com"
                 required>
        </div>

        <div class="form-group">
          <label class="label">Contraseña</label>
          <input nbInput
                 fullWidth
                 [(ngModel)]="password"
                 name="password"
                 type="password"
                 placeholder="Tu contraseña"
                 required>
        </div>

        <div *ngIf="error" class="error-message">
          <nb-icon icon="alert-circle-outline" status="danger"></nb-icon>
          <span>{{ error }}</span>
        </div>

        <button nbButton
                fullWidth
                status="primary"
                type="submit"
                [disabled]="loading">
          <nb-icon *ngIf="loading" icon="loader-outline"></nb-icon>
          {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
        </button>
      </form>
    </nb-card-body>

    <nb-card-footer>
      <p class="footer-text">
        ¿No tienes cuenta?
        <a routerLink="/soundsphere/register">Regístrate aquí</a>
      </p>
    </nb-card-footer>
  </nb-card>
</div>
