<nb-card>
  <nb-card-header>
    <h5>Buscar Canciones</h5>
  </nb-card-header>
  <nb-card-body>
    <div class="search-bar">
      <nb-form-field>
        <nb-icon nbPrefix icon="search-outline"></nb-icon>
        <input nbInput fullWidth
               [(ngModel)]="query"
               (ngModelChange)="onSearch()"
               placeholder="Buscar por canción o artista..."
               type="search">
        <button *ngIf="query" nbButton nbSuffix ghost (click)="clearSearch()">
          <nb-icon icon="close-outline"></nb-icon>
        </button>
      </nb-form-field>
    </div>

    <div *ngIf="loading" class="loading-container">
      <nb-spinner status="primary"></nb-spinner>
    </div>

    <div *ngIf="!loading && searched && songs.length === 0" class="no-results">
      <nb-icon icon="music-outline" class="big-icon"></nb-icon>
      <p>No se encontraron resultados para <strong>"{{ query }}"</strong></p>
    </div>

    <div *ngIf="!loading && songs.length > 0">
      <p class="results-count">{{ songs.length }} resultado(s)</p>
      <div class="songs-grid">
        <ngx-song-card
          *ngFor="let song of songs; trackBy: trackBySong"
          [song]="song"
          (addToPlaylist)="onAddToPlaylist($event)">
        </ngx-song-card>
      </div>
    </div>
  </nb-card-body>
</nb-card>

<nb-card *ngIf="showPlaylistPicker" class="playlist-picker-overlay">
  <nb-card-header>
    <h6>Agregar a playlist</h6>
    <button nbButton ghost size="small" (click)="cancelPlaylistPicker()">
      <nb-icon icon="close-outline"></nb-icon>
    </button>
  </nb-card-header>
  <nb-card-body>
    <p *ngIf="playlistService.getPlaylists().length === 0">
      No tienes playlists. <a routerLink="/pages/music/playlists">Crea una</a>
    </p>
    <ul class="playlist-list">
      <li *ngFor="let p of playlistService.getPlaylists()"
          (click)="addToPlaylist(p.id)" class="playlist-item">
        <nb-icon icon="music-outline"></nb-icon>
        <span>{{ p.name }}</span>
        <small>{{ p.songs.length }} canciones</small>
      </li>
    </ul>
  </nb-card-body>
</nb-card>
